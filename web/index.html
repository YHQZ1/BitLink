<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>BitLink – Free URL Shortener with Analytics & Custom Links</title>

    <!-- SEO -->
    <meta
      name="description"
      content="BitLink is a fast and reliable URL shortener with real-time analytics, custom branded links, QR codes, and powerful link tracking tools."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://bitlk.in/" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/logo.png" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn, Discord) -->
    <meta
      property="og:title"
      content="BitLink – Free URL Shortener with Analytics & Custom Links"
    />
    <meta
      property="og:description"
      content="BitLink is a fast and reliable URL shortener with real-time analytics, custom branded links, QR codes, and powerful link tracking tools."
    />
    <meta property="og:image" content="https://bitlk.in/og-image.png" />
    <meta property="og:url" content="https://bitlk.in" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BitLink" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="BitLink – Free URL Shortener with Analytics & Custom Links"
    />
    <meta
      name="twitter:description"
      content="BitLink is a fast and reliable URL shortener with real-time analytics, custom branded links, QR codes, and powerful link tracking tools."
    />
    <meta name="twitter:image" content="https://bitlk.in/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "BitLink",
        "url": "https://bitlk.in",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "A fast and reliable URL shortener with analytics, custom branded links, and click tracking.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
